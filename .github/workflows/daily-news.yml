name: Daily AI News Update

on:
  schedule:
    - cron: '0 4 * * 0'   # Every Sunday 07:00 Israel time (UTC+3 summer / IDT)
  workflow_dispatch:        # Manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Debug - test Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os, requests
          key = os.environ.get('GEMINI_API_KEY', '')
          print(f"Key length: {len(key)}")
          print(f"Key prefix: {key[:8]}..." if key else "KEY IS EMPTY")
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key={key}"
          r = requests.post(url, json={"contents":[{"parts":[{"text":"Reply with the word OK only"}]}]}, timeout=30)
          print(f"Status: {r.status_code}")
          print(f"Response: {r.text[:400]}")
          EOF

      - name: Fetch and summarize AI news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit updated news-data.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AI Daily Radar Bot"
          git config user.email "bot@ai-daily-radar.local"
          git add news-data.js
          git diff --staged --quiet || git commit -m "Daily news update $(date +'%Y-%m-%d %H:%M UTC')"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
